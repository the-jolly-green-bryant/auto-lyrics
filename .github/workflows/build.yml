name: Android CI and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Read and validate version
        id: metadata
        shell: bash
        run: |
          version=$(sed -nE 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' app/build.gradle.kts | head -1)
          if [[ -z "$version" ]]; then
            echo "Could not read versionName from app/build.gradle.kts" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "artifact_name=auto-lyrics-$version" >> "$GITHUB_OUTPUT"

      - name: Build signed debug APK
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk \
            "dist/${{ steps.metadata.outputs.artifact_name }}.apk"
          cd dist
          sha256sum "${{ steps.metadata.outputs.artifact_name }}.apk" \
            > "${{ steps.metadata.outputs.artifact_name }}.apk.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: dist/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Publish GitHub release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download built APK
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: Auto Lyrics ${{ needs.build.outputs.version }} (build ${{ github.run_number }})
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: true
